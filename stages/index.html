<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ステージ別サマリー - Splatoon3 Battle Logger</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css" data-page>

  <script src="../router.js" type="module"></script>
</head>
<body><main>

<header class="header glass">
  <div class="header-inner">
    <i data-lucide="map"></i>
    <span>ステージ別サマリー</span>
  </div>
</header>

<div class="container card glass">

  <h2 class="section-title">
    <i data-lucide="list"></i>
    ステージ一覧
  </h2>

  <div id="stageList" class="stage-list">
    <!-- JS でステージ一覧を生成 -->
  </div>

</div>

<script type="module">
  import { createIcons, icons } from "https://cdn.skypack.dev/lucide";
  createIcons({ icons });
</script>

<script src="../script.js"></script>
<page-script src="script.js"></page-script>
  

</main>
</body>
</html>
