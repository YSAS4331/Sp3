<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - Splatoon3 Battle Logger</title>

  <link rel="stylesheet" href="/Sp3/style.css">
  <link rel="stylesheet" href="/Sp3/index.css" data-page>

  <link rel="icon" href="/imgs/favicon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" data-page/>

  <script src="/Sp3/router.js" type="module"></script>
  <page-script src="/Sp3/db.js" once></page-script>

  <page-script src="./script.js"></page-script>
</head>

<body>
  <div id="aside-backdrop"></div>

  <sp3-header></sp3-header>

  <div id="app">
    <sp3-aside></sp3-aside>

    <main>
      
      <div class="container card glass">
        <h2 class="section-title">
          <i data-lucide="file-cog"></i>
          デフォルトを設定
        </h2>

        <form id="defaultForm" class="form">
          <div class="form-group">
            <label for="weapon">持ち武器</label>
            <div class="input-wrap">
              <i data-lucide="sword"></i>
              <input type="text" id="weapon" placeholder="持ち武器を入力" required>
            </div>
          </div>

          <div class="form-group">
            <label for="match">よく行くマッチング</label>
            <div class="input-wrap">
              <i data-lucide="swords"></i>
              <select id="match">
                <option value="">選択してください</option>
                <option value="regular">レギュラーマッチ</option>
                <option value="anarchy-c">バンカラマッチ（チャレンジ）</option>
                <option value="anarchy-o">バンカラマッチ（オープン）</option>
                <option value="x">Xマッチ</option>
                <option value="event">イベントマッチ</option>
                <option value="private">プライベートマッチ</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-primary">
            <i data-lucide="save"></i>
            設定を保存
          </button>
        </form>
      </div>
      
    </main>
  </div>
  <script type="module" src="/Sp3/load.js"></script>
</body>
</html>
